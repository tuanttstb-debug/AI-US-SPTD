<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Use Case Package Management</title>
  <!-- CSS -->
  <link rel="stylesheet" href="assets/css/variables.css">
  <link rel="stylesheet" href="assets/css/base.css">
  <link rel="stylesheet" href="assets/css/layout.css">
  <link rel="stylesheet" href="assets/css/components.css">
  <link rel="stylesheet" href="assets/css/wizard.css">
  <link rel="stylesheet" href="assets/css/responsive.css">
</head>
<body>
  <header class="app-header">
    <div class="logo">🚀 Bình dân hóa AI</div>
    <div class="header-title">Đăng ký AI Use Case</div>
  </header>
  <main class="app-container">
    <div class="wizard">
      <div class="progress-bar" id="progressBar"></div>
      <div class="step-indicators" id="stepIndicators"></div>
      <form id="useCaseForm" novalidate>
        <!-- Steps injected by wizard.js -->
      </form>
      <div class="wizard-nav">
        <button type="button" id="prevBtn" class="btn btn-outline" disabled>← Trước</button>
        <button type="button" id="nextBtn" class="btn btn-primary">Tiếp →</button>
        <button type="button" id="submitBtn" class="btn btn-success" style="display:none;">Gửi đăng ký</button>
      </div>
    </div>
    <div id="loadingOverlay" class="loading-overlay hidden">
      <div class="spinner"></div>
    </div>
    <div id="toastContainer" class="toast-container"></div>
  </main>

  <!-- JS dependencies (order matters) -->
  <script src="config/env.js"></script>
  <script src="config/routes.js"></script>
  <script src="assets/js/constants.js"></script>
  <script src="assets/js/helpers.js"></script>
  <script src="assets/js/storage.js"></script>
  <script src="assets/js/api.js"></script>
  <script src="assets/js/validation.js"></script>
  <script src="assets/js/toast.js"></script>
  <script src="assets/js/duplicate-check.js"></script>
  <script src="assets/js/form-mapper.js"></script>
  <script src="assets/js/wizard.js"></script>
  <script src="assets/js/app.js"></script>
</body>
</html>
