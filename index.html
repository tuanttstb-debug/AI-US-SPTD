<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <title>AI Use Case Package Manager</title>
  <?!= include('style'); ?>
</head>
<body>
  <div id="app">
    <!-- Header -->
    <header class="app-header">
      <div class="logo">🧠 AI Use Case Manager</div>
      <nav>
        <button id="nav-new" class="btn-nav active" onclick="navigate('new')">+ New Use Case</button>
        <button id="nav-dashboard" class="btn-nav" onclick="navigate('dashboard')">📊 Dashboard</button>
        <button id="nav-admin" class="btn-nav admin-only" style="display:none" onclick="navigate('admin')">⚙️ Admin</button>
      </nav>
      <div class="user-info" id="userDisplay"></div>
    </header>

    <!-- Main content area -->
    <main id="main-content">
      <!-- Wizard view (default) -->
      <div id="view-wizard" class="view active">
        <div id="edit-banner" class="edit-banner" style="display:none"></div>
        <div class="progress-bar-container">
          <div class="progress-steps">
            <span class="step active" data-step="1">1. Business</span>
            <span class="step" data-step="2">2. AI Flow</span>
            <span class="step" data-step="3">3. Demo & Reuse</span>
            <span class="step" data-step="4">4. Quick Guide</span>
            <span class="step admin-step" data-step="5" style="display:none">5. Review (Admin)</span>
          </div>
          <div class="progress-bar"><div class="progress-fill" style="width:25%"></div></div>
        </div>

        <form id="useCaseForm" onsubmit="return false;">
          <!-- Step 1: Business -->
          <div class="form-step" data-step="1">
            <h2>Business Problem</h2>
            <div class="form-group">
              <label>Tên Use Case <span class="req">*</span></label>
              <input type="text" id="f_UseCase_Name" required placeholder="Nhập tên ngắn gọn, dễ hiểu" onblur="checkDuplicates()">
              <div id="duplicate-warning" class="warning-box" style="display:none"></div>
            </div>
            <div class="form-row">
              <div class="form-group half">
                <label>Người sở hữu (Owner) <span class="req">*</span></label>
                <input type="text" id="f_Owner_Name" required placeholder="Họ tên">
              </div>
              <div class="form-group half">
                <label>Email <span class="req">*</span></label>
                <input type="email" id="f_Owner_Email" required placeholder="email@domain.com">
              </div>
            </div>
            <div class="form-row">
              <div class="form-group half">
                <label>Team <span class="req">*</span></label>
                <select id="f_Team" required></select>
              </div>
              <div class="form-group half">
                <label>Business Category</label>
                <input type="text" id="f_Business_Category" placeholder="e.g. Tín dụng, Vận hành">
              </div>
            </div>
            <div class="form-group">
              <label>Điểm đau (Pain Point) <span class="req">*</span></label>
              <textarea id="f_Pain_Point" rows="2" required placeholder="Mô tả vấn đề hiện tại..."></textarea>
            </div>
            <div class="form-group">
              <label>Quy trình hiện tại</label>
              <textarea id="f_Current_Process" rows="2" placeholder="Các bước thủ công đang làm..."></textarea>
            </div>
            <div class="form-row">
              <div class="form-group half">
                <label>Thời gian hiện tại (phút)</label>
                <input type="number" id="f_Current_Time_Min" min="0" placeholder="0">
              </div>
              <div class="form-group half">
                <label>Vấn đề chính</label>
                <input type="text" id="f_Current_Problem" placeholder="Tóm tắt vấn đề">
              </div>
            </div>
            <div class="form-group">
              <label>Đối tượng sử dụng (User Type)</label>
              <div class="checkbox-group" id="f_User_Type"></div>
            </div>
            <div class="form-group">
              <label>Mục tiêu kỳ vọng <span class="req">*</span></label>
              <div class="checkbox-group" id="f_Expected_Goals"></div>
            </div>
          </div>

          <!-- Step 2: AI Flow -->
          <div class="form-step" data-step="2" style="display:none">
            <h2>Mô tả luồng AI</h2>
            <div class="form-group">
              <label>Mô tả luồng xử lý <span class="req">*</span></label>
              <textarea id="f_Flow_Description" rows="3" required placeholder="Tổng quan cách AI sẽ xử lý..."></textarea>
            </div>
            <div class="form-group">
              <label>Loại dữ liệu đầu vào (Input Types)</label>
              <div class="checkbox-group" id="f_Input_Types"></div>
            </div>
            <div class="collapsible">
              <div class="collapsible-header" onclick="toggleCollapse(this)">⚙️ Prompt Builder (nâng cao) <span class="arrow">▼</span></div>
              <div class="collapsible-body">
                <div class="form-group">
                  <label>Vai trò (Role)</label>
                  <input type="text" id="f_Prompt_Role" placeholder="e.g. Chuyên viên phân tích tín dụng">
                </div>
                <div class="form-group">
                  <label>Nhiệm vụ (Task)</label>
                  <input type="text" id="f_Prompt_Task" placeholder="e.g. Phân tích hồ sơ vay">
                </div>
                <div class="form-group">
                  <label>Mục tiêu (Goal)</label>
                  <input type="text" id="f_Prompt_Goal">
                </div>
                <div class="form-group">
                  <label>Bối cảnh (Context)</label>
                  <textarea id="f_Prompt_Context" rows="2"></textarea>
                </div>
                <div class="form-group">
                  <label>Đầu vào (Input)</label>
                  <textarea id="f_Prompt_Input" rows="2"></textarea>
                </div>
                <div class="form-group">
                  <label>Các bước (Steps)</label>
                  <textarea id="f_Prompt_Steps" rows="3"></textarea>
                </div>
                <div class="form-group">
                  <label>Định dạng đầu ra (Output Format)</label>
                  <textarea id="f_Prompt_Output_Format" rows="2"></textarea>
                </div>
                <div class="form-group">
                  <label>Đánh giá (Evaluation)</label>
                  <textarea id="f_Prompt_Evaluation" rows="2"></textarea>
                </div>
              </div>
            </div>
          </div>

          <!-- Step 3: Demo + Reuse -->
          <div class="form-step" data-step="3" style="display:none">
            <h2>Demo & Hiệu quả</h2>
            <div class="form-row">
              <div class="form-group half">
                <label>Đã có demo chưa?</label>
                <div class="radio-group">
                  <label><input type="radio" name="demoStatus" value="Có" onclick="document.getElementById('f_Demo_Status').value='Có'"> Có</label>
                  <label><input type="radio" name="demoStatus" value="Chưa" onclick="document.getElementById('f_Demo_Status').value='Chưa'" checked> Chưa</label>
                </div>
                <input type="hidden" id="f_Demo_Status" value="Chưa">
              </div>
              <div class="form-group half">
                <label>Link Demo</label>
                <input type="url" id="f_Demo_Link" placeholder="https://...">
              </div>
            </div>
            <div class="form-row">
              <div class="form-group half">
                <label>Thời gian trước (phút)</label>
                <input type="number" id="f_Before_Time_Min" min="0">
              </div>
              <div class="form-group half">
                <label>Thời gian sau (phút)</label>
                <input type="number" id="f_After_Time_Min" min="0">
              </div>
            </div>
            <div class="form-group">
              <label>Cải thiện chất lượng</label>
              <textarea id="f_Quality_Improvement" rows="2"></textarea>
            </div>
            <div class="form-group">
              <label>Ghi chú cải tiến</label>
              <textarea id="f_Improvement_Note" rows="2"></textarea>
            </div>
            <div class="form-group">
              <label>Mức độ tái sử dụng (Reuse)</label>
              <div class="checkbox-group" id="f_Reuse_Level"></div>
            </div>
            <div class="form-group">
              <label>Điều chỉnh cho reuse</label>
              <textarea id="f_Reuse_Adjustment" rows="2" placeholder="Cần thay đổi gì để dùng cho team khác?"></textarea>
            </div>
          </div>

          <!-- Step 4: Quick Guide -->
          <div class="form-step" data-step="4" style="display:none">
            <h2>Hướng dẫn nhanh & Gửi</h2>
            <div class="form-group">
              <label>Khi nào dùng?</label>
              <textarea id="f_When_To_Use" rows="2" placeholder="Tình huống áp dụng..."></textarea>
            </div>
            <div class="form-group">
              <label>Các bước sử dụng</label>
              <textarea id="f_Usage_Steps" rows="3" placeholder="1. ... 2. ..."></textarea>
            </div>
            <div class="form-group">
              <label>Ghi chú sử dụng</label>
              <textarea id="f_Usage_Notes" rows="2"></textarea>
            </div>
            <div class="form-actions">
              <button type="button" class="btn btn-secondary" onclick="saveDraft()">💾 Lưu nháp</button>
              <button type="button" class="btn btn-primary" onclick="submitForm('Submitted')">📨 Gửi duyệt</button>
            </div>
          </div>

          <!-- Step 5: Admin Review (only for admin in edit mode) -->
          <div class="form-step admin-step" data-step="5" style="display:none">
            <h2>Quản trị & Review (Admin)</h2>
            <div class="form-row">
              <div class="form-group half">
                <label>Trạng thái (Status)</label>
                <select id="f_Status"></select>
              </div>
              <div class="form-group half">
                <label>Giai đoạn (Stage)</label>
                <select id="f_Current_Stage"></select>
              </div>
            </div>
            <div class="form-group">
              <label>Người review</label>
              <input type="text" id="f_Reviewer">
            </div>
            <div class="form-group">
              <label>Ngày review</label>
              <input type="date" id="f_Review_Date">
            </div>
            <div class="form-group">
              <label>Comment</label>
              <textarea id="f_Review_Comment" rows="2"></textarea>
            </div>
            <div class="form-row">
              <div class="form-group half">
                <label>AI Day Flag</label>
                <select id="f_AI_Day_Flag"><option value="">--</option><option value="Yes">Yes</option><option value="No">No</option></select>
              </div>
              <div class="form-group half">
                <label>Ngày AI Day</label>
                <input type="date" id="f_AI_Day_Date">
              </div>
            </div>
            <div class="form-group">
              <label>Leadership Support Needed</label>
              <input type="text" id="f_Leadership_Support_Needed">
            </div>
            <div class="form-actions">
              <button type="button" class="btn btn-primary" onclick="submitForm('adminUpdate')">✅ Cập nhật Admin</button>
            </div>
          </div>
        </form>

        <div class="step-navigation">
          <button id="prevBtn" class="btn btn-outline" onclick="prevStep()" disabled>← Trước</button>
          <button id="nextBtn" class="btn btn-primary" onclick="nextStep()">Tiếp →</button>
        </div>
      </div>

      <!-- Dashboard view -->
      <div id="view-dashboard" class="view" style="display:none">
        <h2>📊 Dashboard Lãnh đạo</h2>
        <div id="dashboard-metrics" class="metrics-grid">Loading...</div>
        <button onclick="navigate('new')" class="btn btn-outline">← Quay lại</button>
      </div>

      <!-- Admin panel view (list all for quick management) -->
      <div id="view-admin" class="view" style="display:none">
        <h2>⚙️ Quản lý Use Cases</h2>
        <input type="text" id="adminSearch" placeholder="Tìm kiếm..." oninput="renderAdminList()">
        <div id="admin-list"></div>
        <button onclick="navigate('new')" class="btn btn-outline">← Quay lại</button>
      </div>
    </main>

    <!-- Toast container -->
    <div id="toast" class="toast"></div>
    <!-- Loading overlay -->
    <div id="loading" class="loading-overlay" style="display:none">
      <div class="spinner"></div>
    </div>
  </div>

  <?!= include('script'); ?>
</body>
</html>
