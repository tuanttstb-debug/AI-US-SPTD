<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="AI Use Case Platform — TT SPTD">
  <title>AI Use Case Platform — TT SPTD</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚀</text></svg>">
  <link rel="shortcut icon"    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚀</text></svg>">
  <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚀</text></svg>">

  <link rel="stylesheet" href="assets/css/variables.css">
  <link rel="stylesheet" href="assets/css/base.css">
  <link rel="stylesheet" href="assets/css/typography.css">
  <link rel="stylesheet" href="assets/css/components.css">
  <link rel="stylesheet" href="assets/css/states.css">
  <link rel="stylesheet" href="assets/css/responsive.css">
  <link rel="stylesheet" href="assets/css/portal.css">
</head>
<body>

  <!-- Portal Header -->
  <header class="portal-header" role="banner">
    <div class="portal-brand" aria-label="Trang chủ AI Platform">
      <span class="portal-brand-icon" aria-hidden="true">🚀</span>
      <span class="portal-brand-name">Bình dân hóa AI</span>
      <span class="portal-brand-sep" aria-hidden="true"></span>
      <span class="portal-brand-sub">Platform</span>
    </div>
    <div class="portal-user-area" id="portalUserArea">
      <div class="portal-user-chip" aria-label="Tài khoản đăng nhập">
        <div class="portal-user-avatar" id="portalUserAvatar" aria-hidden="true"></div>
        <span class="portal-user-name" id="portalUserDisplay"></span>
      </div>
      <button class="portal-logout-btn" id="portalLogoutBtn" type="button">
        Đăng xuất
      </button>
    </div>
  </header>

  <!-- Portal Body -->
  <div class="portal-body-bg" id="portalBody" style="display:none">
    <main class="portal-main" role="main">

      <h1 class="portal-page-title">Tất cả dịch vụ</h1>

      <div class="service-sections" id="serviceSections" role="navigation" aria-label="Danh sách dịch vụ">
        <!-- Sections injected by JS based on user role -->
      </div>

    </main>

    <footer class="portal-footer">
      AI Use Case Platform · TT SPTD · v2.2.0
    </footer>
  </div>

  <!-- Toast -->
  <div id="toastContainer" class="toast-container" aria-live="polite" aria-atomic="false"></div>

  <!-- Scripts -->
  <script src="config/env.js"></script>
  <script src="assets/js/auth.js"></script>
  <script>
    (function () {
      'use strict';

      // ── Backward compat: redirect old ?edit= links to register.html ──
      var sp = new URLSearchParams(window.location.search);
      if (sp.has('edit')) {
        window.location.replace('register.html' + window.location.search);
        return;
      }

      // ── Auth guard ──
      if (!AuthService.requireAuth()) return;

      var user = AuthService.getUser();

      // ── Service catalog (data-driven, role-aware) ─────────────────
      // To add a new service: push to PORTAL_SERVICES.
      // roles: ['user'] = all logged-in users, ['admin'] = admin only.
      var PORTAL_SERVICES = [
        {
          sectionLabel: 'Đăng ký & Quản lý',
          items: [
            {
              icon:  '🚀',
              label: 'Đăng ký AI Use Case',
              desc:  'Tạo mới và nộp use case AI cho team',
              href:  'register.html',
              roles: ['user', 'admin']
            },
            {
              icon:     '📋',
              label:    'Use case của tôi',
              desc:     'Xem trạng thái và chỉnh sửa use case đã nộp',
              href:     '#',
              roles:    ['user', 'admin'],
              badge:    'Sắp có',
              disabled: true
            }
          ]
        },
        {
          sectionLabel: 'Báo cáo & Phân tích',
          items: [
            {
              icon:  '📊',
              label: 'Dashboard tổng quan',
              desc:  'Thống kê, phân tích và duyệt use case',
              href:  'dashboard.html',
              roles: ['admin']
            }
          ]
        }
      ];

      // ── Render portal ─────────────────────────────────────────────
      var displayEl  = document.getElementById('portalUserDisplay');
      var avatarEl   = document.getElementById('portalUserAvatar');
      var sectionsEl = document.getElementById('serviceSections');
      var role       = user.role || 'user';
      var initials   = (user.displayName || user.email).charAt(0).toUpperCase();

      if (displayEl) displayEl.textContent = user.displayName || user.email;
      if (avatarEl)  avatarEl.textContent  = initials;

      document.getElementById('portalLogoutBtn').addEventListener('click', function () {
        AuthService.logout();
        window.location.replace('login.html');
      });

      // ── Render service sections ───────────────────────────────────
      PORTAL_SERVICES.forEach(function (section) {
        var visibleItems = section.items.filter(function (item) {
          return item.roles.indexOf(role) !== -1;
        });
        if (!visibleItems.length) return;

        var sectionEl = document.createElement('div');
        sectionEl.className = 'service-section';

        var titleEl = document.createElement('h2');
        titleEl.className = 'service-section-title';
        titleEl.textContent = section.sectionLabel;
        sectionEl.appendChild(titleEl);

        var listEl = document.createElement('div');
        listEl.className = 'service-list';
        listEl.setAttribute('role', 'list');

        visibleItems.forEach(function (item) {
          var tag = item.disabled ? 'div' : 'a';
          var el  = document.createElement(tag);
          el.className = 'service-item' + (item.disabled ? ' is-disabled' : '');
          el.setAttribute('role', 'listitem');

          if (!item.disabled) {
            el.href = item.href;
            el.setAttribute('aria-label', item.label + (item.desc ? ' — ' + item.desc : ''));
          } else {
            el.setAttribute('aria-disabled', 'true');
          }

          // Icon
          var iconEl = document.createElement('div');
          iconEl.className = 'service-item-icon';
          iconEl.setAttribute('aria-hidden', 'true');
          iconEl.textContent = item.icon;

          // Content
          var contentEl = document.createElement('div');
          contentEl.className = 'service-item-content';

          var labelEl = document.createElement('p');
          labelEl.className = 'service-item-label';
          labelEl.textContent = item.label;

          var descEl = document.createElement('p');
          descEl.className = 'service-item-desc';
          descEl.textContent = item.desc;

          contentEl.appendChild(labelEl);
          contentEl.appendChild(descEl);

          // Right
          var rightEl = document.createElement('div');
          rightEl.className = 'service-item-right';

          if (item.badge) {
            var badgeEl = document.createElement('span');
            badgeEl.className = 'service-item-badge';
            badgeEl.textContent = item.badge;
            rightEl.appendChild(badgeEl);
          }

          if (!item.disabled) {
            var chevron = document.createElement('i');
            chevron.className = 'service-item-chevron';
            chevron.setAttribute('aria-hidden', 'true');
            chevron.textContent = '›';
            rightEl.appendChild(chevron);
          }

          el.appendChild(iconEl);
          el.appendChild(contentEl);
          el.appendChild(rightEl);
          listEl.appendChild(el);
        });

        sectionEl.appendChild(listEl);
        sectionsEl.appendChild(sectionEl);
      });

      // Show portal
      document.getElementById('portalBody').style.display = '';
    })();
  </script>

</body>
</html>
