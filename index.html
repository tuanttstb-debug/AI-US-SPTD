  <div id="toastContainer" class="toast-container" aria-live="polite" aria-atomic="false"></div>

  <script src="config/env.js"></script>
  <script src="assets/js/auth.js"></script>
  <script>
    (function () {
      'use strict';

      // Backward compat: redirect old ?edit= links to register.html
      var sp = new URLSearchParams(window.location.search);
      if (sp.has('edit')) {
        window.location.replace('register.html' + window.location.search);
        return;
      }

      if (!AuthService.requireAuth()) return;

      var user = AuthService.getUser();
      var role = user ? (user.role || 'user') : 'user';
      var initials = ((user && (user.displayName || user.email)) || '?').charAt(0).toUpperCase();

      // Populate sidebar + topbar
      function setEl(id, val) { var el = document.getElementById(id); if (el) el.textContent = val; }
      setEl('sidebarAvatar',   initials);
      setEl('sidebarUserName', user ? (user.displayName || user.email) : '');
      setEl('sidebarUserRole', role === 'admin' ? 'Admin' : 'Người dùng');
      setEl('topbarAvatar',    initials);
      setEl('topbarUserName',  user ? (user.displayName || user.email) : '');
      var chip = document.getElementById('topbarUserChip'); if (chip) chip.style.display = '';

      // Show Dashboard nav for admin
      if (role === 'admin') {
        var navDash = document.getElementById('navDashboard'); if (navDash) navDash.style.display = '';
      }

      document.getElementById('sidebarLogoutBtn').addEventListener('click', function () {
        AuthService.logout();
        window.location.replace('login.html');
      });

      // Sidebar toggle
      var sidebar = document.getElementById('appSidebar');
      var overlay = document.getElementById('sidebarOverlay');
      var toggle  = document.getElementById('sidebarToggle');
      function openSidebar()  { sidebar.classList.add('is-open');    overlay.classList.add('is-visible');    toggle.setAttribute('aria-expanded','true'); }
      function closeSidebar() { sidebar.classList.remove('is-open'); overlay.classList.remove('is-visible'); toggle.setAttribute('aria-expanded','false'); }
      if (toggle)  toggle.addEventListener('click', function () { sidebar.classList.contains('is-open') ? closeSidebar() : openSidebar(); });
      if (overlay) overlay.addEventListener('click', closeSidebar);
      document.addEventListener('keydown', function (e) { if (e.key === 'Escape') closeSidebar(); });

      // Service catalog (data-driven, role-aware)
      var PORTAL_SERVICES = [
        {
          sectionLabel: 'Đăng ký & Quản lý',
          items: [
            {
              icon: '<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" width="24" height="24"><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m3.75 9v6m3-3H9m1.5-12H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z" /></svg>',
              label: 'Đăng ký AI Use Case',
              desc:  'Tạo mới và nộp use case AI cho team',
              href:  'register.html',
              roles: ['user', 'admin']
            },
            {
              icon: '<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" width="24" height="24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12h3.75M9 15h3.75M9 18h3.75m3 .75H18a2.25 2.25 0 002.25-2.25V6.108c0-1.135-.845-2.098-1.976-2.192a48.424 48.424 0 00-1.123-.08m-5.801 0c-.065.21-.1.433-.1.664 0 .414.336.75.75.75h4.5a.75.75 0 00.75-.75 2.25 2.25 0 00-.1-.664m-5.8 0A2.251 2.251 0 0113.5 2.25H15c1.012 0 1.867.668 2.15 1.586m-5.8 0c-.376.023-.75.05-1.124.08C9.095 4.01 8.25 4.973 8.25 6.108V8.25m0 0H4.875c-.621 0-1.125.504-1.125 1.125v11.25c0 .621.504 1.125 1.125 1.125h9.75c.621 0 1.125-.504 1.125-1.125V9.375c0-.621-.504-1.125-1.125-1.125H8.25zM6.75 12h.008v.008H6.75V12zm0 3h.008v.008H6.75V15zm0 3h.008v.008H6.75V18z" /></svg>',
              label: 'Use case của tôi',
              desc:  'Xem trạng thái và chỉnh sửa use case đã nộp',
              href:  'dashboard.html?tab=my',
              roles: ['user', 'admin']
            }
          ]
        },
        {
          sectionLabel: 'Báo cáo & Phân tích',
          items: [
            {
              icon: '<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" width="24" height="24"><path stroke-linecap="round" stroke-linejoin="round" d="M7.5 14.25v2.25m3-4.5v4.5m3-6.75v6.75m3-9v9M6 20.25h12A2.25 2.25 0 0020.25 18V6A2.25 2.25 0 0018 3.75H6A2.25 2.25 0 003.75 6v12A2.25 2.25 0 006 20.25z" /></svg>',
              label: 'Dashboard tổng quan',
              desc:  'Thống kê, phân tích và duyệt use case',
              href:  'dashboard.html',
              roles: ['admin']
            }
          ]
        }
      ];

      var sectionsEl = document.getElementById('serviceSections');
      PORTAL_SERVICES.forEach(function (section) {
        var visibleItems = section.items.filter(function (item) {
          return item.roles.indexOf(role) !== -1;
        });
        if (!visibleItems.length) return;

        var sectionEl = document.createElement('div');
        sectionEl.className = 'service-section';

        var titleEl = document.createElement('h2');
        titleEl.className = 'service-section-title';
        titleEl.textContent = section.sectionLabel;
        sectionEl.appendChild(titleEl);

        var listEl = document.createElement('div');
        listEl.className = 'service-list';
        listEl.setAttribute('role', 'list');

        visibleItems.forEach(function (item) {
          var el = document.createElement('a');
          el.className = 'service-item';
          el.href = item.href;
          el.setAttribute('role', 'listitem');
          el.setAttribute('aria-label', item.label + (item.desc ? ' — ' + item.desc : ''));

          var iconEl = document.createElement('div');
          iconEl.className = 'service-item-icon';
          iconEl.setAttribute('aria-hidden', 'true');
          iconEl.innerHTML = item.icon;

          var contentEl = document.createElement('div');
          contentEl.className = 'service-item-content';
          var labelEl = document.createElement('p');
          labelEl.className = 'service-item-label';
          labelEl.textContent = item.label;
          var descEl = document.createElement('p');
          descEl.className = 'service-item-desc';
          descEl.textContent = item.desc;
          contentEl.appendChild(labelEl);
          contentEl.appendChild(descEl);

          var rightEl = document.createElement('div');
          rightEl.className = 'service-item-right';
          var chevron = document.createElement('i');
          chevron.className = 'service-item-chevron';
          chevron.setAttribute('aria-hidden', 'true');
          chevron.textContent = '›';
          rightEl.appendChild(chevron);

          el.appendChild(iconEl);
          el.appendChild(contentEl);
          el.appendChild(rightEl);
          listEl.appendChild(el);
        });

        sectionEl.appendChild(listEl);
        sectionsEl.appendChild(sectionEl);
      });

      document.getElementById('portalMain').style.display = '';
    })();
  </script>
